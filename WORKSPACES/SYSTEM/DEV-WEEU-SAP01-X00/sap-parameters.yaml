---
#############################################################################
#                           Application tier                                #
#############################################################################
# sap_sid is the application SID
sap_sid:                       X00

# scs_high_availability is a boolean flag indicating
# if the SAP Central Services are deployed using high availability
scs_high_availability:         true
scs_cluster_type:              AFA
scs_instance_number:           "00"
ers_instance_number:           "01"

#############################################################################
#                              Database tier                                #
#############################################################################

# sap_sid is the database SID
db_sid:                        HDB
db_instance_number:            "00"
# platform defines the database platform
# valid values are: HANA, SQLSERVER, Oracle, Db2, ASE
platform:                      HANA
database_high_availability:    true
database_cluster_type:         AFA
# database scale out
database_scale_out :           false

#############################################################################
#                              Storage Profile                              #
#############################################################################
NFS_provider:                  AFS

#############################################################################
#                        Key Vault Parameters (optional)                    #
#############################################################################
key_vault_id:                  /subscriptions/<subscription-id>/resourceGroups/<resource-group>/providers/Microsoft.KeyVault/vaults/<key-vault-name>
secret_id:                     https://<key-vault-name>.vault.azure.net/secrets/<secret-name>/<id>

#############################################################################
#                            MSI Client ID                                  #
#############################################################################
# The MSI Client ID is used to authenticate to Azure services
# and is required if the management server uses user assigned managed identity
user_assigned_identity_client_id: "00000000-0000-0000-0000-000000000000"

#############################################################################
#                        ANF Parameters (optional)                           #
#############################################################################
ANF_account_rg:                "ANF-RESOURCE-GROUP"
ANF_account_name:              "ANF-ACCOUNT-NAME"

#############################################################################
#                  Azure Backup Parameters (optional)                       #
#  Required when SAP_FUNCTIONAL_TEST_TYPE is AzureBackupDatabase            #
#############################################################################

# Recovery Services vault resource ID (required)
backup_vault_resource_id:      "/subscriptions/<subscription-id>/resourceGroups/<resource-group>/providers/Microsoft.RecoveryServices/vaults/<vault-name>"

# Whether to restore SYSTEMDB (set false to skip)
backup_restore_systemdb:       true

# Restrict tenant restore to specific DBs (empty = all tenants)
backup_restore_tenants:        []          # e.g. ["HDB", "H01"]

# Filesystem restore target path (required for test case 3); must be writable
backup_target_filesystem_path: "/hana/backup/restore"

# Target VM hostname for cross-VM restore (required for test case 5, disabled by default)
# Must be a hostname resolvable from the source VM (e.g., via DNS or /etc/hosts)
# Target VM resource group (optional; defaults to source VM's resource group if empty)
backup_target_vm_name:         ""
backup_target_vm_rg:           ""

# Point-in-time restore (ISO 8601 UTC, optional; empty uses latest recovery point)
backup_restore_point_time:     ""

# HANA userstore key (created as part of pre-registration for Azure Backup)
hana_userstore_key:            "SYSTEM"
