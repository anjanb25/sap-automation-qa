services:
  sap-qa-service:
    build:
      context:            ..
      dockerfile:         deploy/Dockerfile
    container_name:       sap-qa-service
    user:                 "${HOST_UID:-1000}:${HOST_GID:-1000}"
    restart:              unless-stopped
    ports:
                          - "8000:8000"
    environment:
                          - LOG_FORMAT=${LOG_FORMAT:-json}
                          - LOG_LEVEL=${LOG_LEVEL:-INFO}
                          - SCHEDULER_CHECK_INTERVAL=${SCHEDULER_CHECK_INTERVAL:-60}
                          - PYTHONPATH=/app
                          - TELEMETRY_DATA_DESTINATION=${TELEMETRY_DATA_DESTINATION:-}
                          - LAWS_WORKSPACE_ID=${LAWS_WORKSPACE_ID:-}
                          - LAWS_SHARED_KEY=${LAWS_SHARED_KEY:-}
                          - LAWS_SUBSCRIPTION_ID=${LAWS_SUBSCRIPTION_ID:-}
                          - LAWS_RESOURCE_GROUP=${LAWS_RESOURCE_GROUP:-}
                          - LAWS_WORKSPACE_NAME=${LAWS_WORKSPACE_NAME:-}
                          - ADX_DATABASE_NAME=${ADX_DATABASE_NAME:-}
                          - ADX_CLUSTER_FQDN=${ADX_CLUSTER_FQDN:-}
                          - ADX_CLIENT_ID=${ADX_CLIENT_ID:-}
    volumes:
                          - sap-qa-data:/app/data
                          - ../WORKSPACES:/app/WORKSPACES
                          - ../vars.yaml:/app/vars.yaml:ro
    healthcheck:
      test:               ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval:           30s
      timeout:            10s
      retries:            3
      start_period:       10s
    networks:
                          - sap-qa-network
    logging:
      driver:             "json-file"
      options:
        max-size:         "10m"
        max-file:         "3"

volumes:
  sap-qa-data:
    driver:               local

networks:
  sap-qa-network:
    driver:               bridge
