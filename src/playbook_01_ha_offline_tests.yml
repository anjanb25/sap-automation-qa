- hosts:                               localhost
  gather_facts:                        false
  name:                                "Setup deployer for HA Testing Framework"
  vars_files:                          "./vars/input-api.yaml"
  tasks:
    - name:                            "Init: Install Required Python Azure Packages"
      ansible.builtin.pip:
        name:
          - azure-identity
          - azure-kusto-data
          - azure-kusto-ingest
          - azure-mgmt-compute
          - azure-mgmt-network
          - azure-storage-blob
          - azure-storage-queue
          - pandas

    - name:                            "Init: Authenticate to Azure Using Managed Identity"
      block:
        - name:                        "Init: Authenticate With Username (az cli >= 2.61)"
          ansible.builtin.command:
            cmd:                        >-
                                        az login --identity
                                        {% if user_assigned_identity_client_id | default('', true) | length > 0
                                        and user_assigned_identity_client_id != '00000000-0000-0000-0000-000000000000' %}
                                        --username {{ user_assigned_identity_client_id }}
                                        {% endif %}
          changed_when:                 false
      rescue:
        - name:                        "Init: Authenticate With Client ID (az cli < 2.61)"
          ansible.builtin.command:
            cmd:                        >-
                                        az login --identity
                                        {% if user_assigned_identity_client_id | default('', true) | length > 0
                                        and user_assigned_identity_client_id != '00000000-0000-0000-0000-000000000000' %}
                                        --client-id {{ user_assigned_identity_client_id }}
                                        {% endif %}
          changed_when:                 false

    - name:                            "Orchestration: Determine HANA Topology From Inventory"
      ansible.builtin.set_fact:
        hana_topology:                 "{{ 'scale_out_hsr' if (database_scale_out | default(database_HANA_use_scaleout_scenario | default(false)) | bool) else 'scale_up' }}"
      run_once:                        true
      when:                            SAP_FUNCTIONAL_TEST_TYPE == 'DatabaseHighAvailability'

    - name:                            "Orchestration: Set Test Group Name"
      ansible.builtin.set_fact:
        test_group_name:               "{{ sap_functional_test_type_map
                                        | selectattr('name', 'equalto', SAP_FUNCTIONAL_TEST_TYPE)
                                        | map(attribute='value') | first }}{{ '_' + (platform | upper)
                                        if SAP_FUNCTIONAL_TEST_TYPE == 'DatabaseHighAvailability' else '' }}"
      run_once:                        true

    - name:                            "Orchestration: Set Test Group Facts"
      ansible.builtin.set_fact:
        test_group_start_time:         "{{ now(utc=true,fmt='%Y-%m-%d %H:%M:%S') }}"
        test_group_invocation_id:      "{{ lookup('pipe', 'uuidgen') }}"
        test_cases:                    "{{ test_groups
                                            | selectattr('name', 'equalto', test_group_name)
                                            | map(attribute='test_cases') | list | flatten(levels=1)
                                            | selectattr('task_name', 'contains', 'offline') | list }}"
      run_once:                        true

    - name:                            "Orchestration: Run Test Cases"
      ansible.builtin.include_tasks:   "./roles/{{ test_group_name | lower }}/tasks/{{ item.task_name }}.yml"
      loop:                            "{{ test_cases | list }}"
      vars:
        group_invocation_id:           "{{ test_group_invocation_id }}"
        group_start_time:              "{{ test_group_start_time }}"
        group_name:                    "{{ SAP_FUNCTIONAL_TEST_TYPE }}"
      when:                             test_group_name is defined

    - name:                            "Report: Render HTML Report"
      ansible.builtin.include_tasks:   "./roles/misc/tasks/render-html-report.yml"
      when:                            test_group_name is defined

    - name:                            "Report: Debug Group Invocation ID"
      ansible.builtin.debug:
        msg:                           "Group invocation ID: {{ test_group_invocation_id }}"
      when:                            test_group_invocation_id is defined
