# /*---------------------------------------------------------------------------
# |           Azure Backup Setup Verification for SAP HANA                    |
# +--------------------------------------------------------------------------*/

- name:                                 "Test Setup Tasks"
  ansible.builtin.include_tasks:        "roles/misc/tasks/test-case-setup.yml"
  run_once:                             true
  tags:                                 [pre-validation]

- name:                                 "Load backup parameter definitions"
  ansible.builtin.include_vars:
    file:                               "roles/backup_db_hana/vars/backup-parameters.yml"
  run_once:                             true

# /*---------------------------------------------------------------------------
# |                     Resolve Source VM for Discovery                        |
# +--------------------------------------------------------------------------*/
- name:                                 "Resolve source VM name for HA systems"
  when:
                                        - node_tier == "hana"
                                        - database_high_availability | default(false) | bool
  block:
    - name:                             "HA Setup: Run DB pre-validations to get cluster status"
      ansible.builtin.include_tasks:    "roles/misc/tasks/pre-validations-db.yml"
      tags:                             [pre-validation]

    - name:                             "HA Setup: Resolve primary node VM name"
      ansible.builtin.set_fact:
        backup_verify_vm_name:          "{{ hostvars[cluster_status_pre.primary_node].azure_instance_metadata.json.compute.name }}"
      run_once:                         true

- name:                                 "Resolve source VM name for standalone systems"
  when:
                                        - node_tier == "hana"
                                        - not (database_high_availability | default(false) | bool)
  ansible.builtin.set_fact:
    backup_verify_vm_name:              "{{ azure_instance_metadata.json.compute.name }}"
  run_once:                             true

# /*---------------------------------------------------------------------------
# |                          Test Execution                                   |
# +--------------------------------------------------------------------------*/
- name:                                 "Azure Backup Setup Verification"
  when:                                 node_tier == "hana"
  block:
    - name:                             "Test Execution: Start timer"
      ansible.builtin.set_fact:
        test_execution_start:           "{{ now(utc=true, fmt='%Y-%m-%d %H:%M:%S') }}"
        test_execution_hostname:        "{{ ansible_hostname }}"
      run_once:                         true

    - name:                             "Test Execution: Discover and validate protected databases"
      delegate_to:                      localhost
      azure_backup_hana:
        operation:                      "discover_protected_items"
        vault_resource_id:              "{{ backup_vault_resource_id }}"
        subscription_id:                "{{ azure_instance_metadata.json.compute.subscriptionId }}"
        msi_client_id:                  "{{ user_assigned_identity_client_id | default('') }}"
        database_sid:                   "{{ db_sid | upper }}"
        source_vm_name:                 "{{ backup_verify_vm_name }}"
        parameter_definitions:          "{{ backup_parameters | default([]) }}"
      register:                         backup_verification_result
      run_once:                         true

    - name:                             "Test Execution: Validate protected items found"
      ansible.builtin.assert:
        that:
          - backup_verification_result.protected_items | length > 0
        fail_msg: >-
          No protected HANA databases found for VM
          '{{ backup_verify_vm_name }}'
          in vault {{ backup_vault_resource_id }}
        success_msg:                    "Found {{ backup_verification_result.protected_items | length }} protected database(s)"
      run_once:                         true

    - name:                             "Test Execution: Display backup configuration per database"
      ansible.builtin.debug:
        msg: |
          Database: {{ db_row.name }}
          HANA System: {{ db_row.hana_system }}
          Server Type: {{ db_row.server_type }}
          Backup Status: {{ db_row.backup_status }}
          Health: {{ db_row.health_status }} | Protection: {{ db_row.protection_status }}
          Last Backup: {{ db_row.last_backup_time | default('N/A') }}
          Latest Restore Point: {{ db_row.latest_restore_point }}
          Backup Type: {{ db_row.backup_type }}
      loop:                             "{{ backup_verification_result.protected_items }}"
      loop_control:
        loop_var:                       db_row
      run_once:                         true

    - name:                             "Test Execution: Set cumulative test status"
      ansible.builtin.set_fact:
        test_execution_status:          "{{ backup_verification_result.status
                                            | replace('PASSED','PASSED')
                                            | replace('WARNING','WARNING')
                                            | replace('FAILED','FAILED') }}"
      run_once:                         true

    - name:                             "Test Execution: Stop timer"
      ansible.builtin.set_fact:
        test_execution_end:             "{{ now(utc=true, fmt='%Y-%m-%d %H:%M:%S') }}"
      run_once:                         true

    - name:                             "Test Execution: Set test case message and details"
      ansible.builtin.set_fact:
        test_case_message_from_test_case: "{{ backup_verification_result.message }}"
        test_case_details_from_test_case: "{{ backup_verification_result.details }}"
        test_case_var_log_messages_from_test_case: >-
          {{ {'protected_items': backup_verification_result.protected_items,
              'restore_points': backup_verification_result.restore_points | default([]),
              'execution_logs': backup_verification_result.logs | default([])}
             | to_nice_json }}
      run_once:                         true

    - name:                             "Post Validations Tasks"
      ansible.builtin.include_tasks:    "roles/backup_db_hana/tasks/post-validations-backup.yml"
      tags:                             [post-validation]
      run_once:                         true

  rescue:
    - name:                             "Rescue operation"
      ansible.builtin.include_tasks:    "roles/backup_db_hana/tasks/rescue-backup.yml"
      tags:                             [cleanup]
      run_once:                         true
