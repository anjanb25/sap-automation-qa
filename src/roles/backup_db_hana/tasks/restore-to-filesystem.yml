# /*---------------------------------------------------------------------------
# |       Restore HANA DB Backup to FileSystem using Azure Backup             |
# +--------------------------------------------------------------------------*/

- name:                                 "Test Setup Tasks"
  ansible.builtin.include_tasks:        "roles/misc/tasks/test-case-setup.yml"
  run_once:                             true
  tags:                                 [pre-validation]

# /*---------------------------------------------------------------------------
# |                          Pre Validations                                  |
# +--------------------------------------------------------------------------*/
- name:                              "Pre Validations: Backup Restore to Filesystem"
  when:                              node_tier == "hana"
  block:
    - name:                          "Pre Validation: HA cluster status"
      when:                          database_high_availability | default(false) | bool
      block:
        - name:                      "Pre Validation: Run standard DB pre-validations"
          ansible.builtin.include_tasks: "roles/misc/tasks/pre-validations-db.yml"
          tags:                         [pre-validation]

        - name:                     "Pre Validation: Set primary/secondary from cluster status"
          ansible.builtin.set_fact:
            backup_primary_node:    "{{ cluster_status_pre.primary_node }}"
            backup_secondary_node:  "{{ cluster_status_pre.secondary_node }}"
            backup_primary_site_name: "{{ cluster_status_pre.primary_site_name | default('') }}"
            backup_secondary_site_name: "{{ cluster_status_pre.secondary_site_name | default('') }}"
          run_once:                 true

        - name:                     "Pre Validation: Verify secondary node is resolved"
          ansible.builtin.assert:
            that:
              - backup_secondary_node | default('') != ''
            fail_msg:               "Secondary node hostname is empty. cluster_status_pre.secondary_node was not resolved."
          run_once:                 true

        - name:                     "Pre Validation: Resolve primary VM details for HSR"
          ansible.builtin.set_fact:
            backup_restore_vm_name:        "{{ hostvars[backup_primary_node].azure_instance_metadata.json.compute.name }}"
            backup_restore_vm_rg:          "{{ hostvars[backup_primary_node].azure_instance_metadata.json.compute.resourceGroupName }}"
            backup_restore_subscription:   "{{ hostvars[backup_primary_node].azure_instance_metadata.json.compute.subscriptionId }}"
          run_once:                 true

    - name:                         "Pre Validation: Set standalone node facts"
      ansible.builtin.set_fact:
        backup_primary_node:        "{{ ansible_hostname }}"
        backup_secondary_node:      ""
        backup_restore_vm_name:     "{{ azure_instance_metadata.json.compute.name }}"
        backup_restore_vm_rg:       "{{ azure_instance_metadata.json.compute.resourceGroupName }}"
        backup_restore_subscription: "{{ azure_instance_metadata.json.compute.subscriptionId }}"
      run_once:                     true
      when:                         not (database_high_availability | default(false) | bool)

    - name:                         "Pre Validation: Verify target filesystem path exists"
      become:                       true
      ansible.builtin.file:
        path:                       "{{ backup_target_filesystem_path }}"
        state:                      directory
        mode:                       "0755"
      register:                     fs_path_check
      delegate_to:                  "{{ backup_primary_node }}"
      run_once:                     true

    - name:                          "Pre Validation: Discover protected items for source VM"
      delegate_to:                   localhost
      azure_backup_hana:
        operation:                   "discover_protected_items"
        vault_resource_id:           "{{ backup_vault_resource_id }}"
        subscription_id:             "{{ azure_instance_metadata.json.compute.subscriptionId }}"
        msi_client_id:               "{{ user_assigned_identity_client_id | default('') }}"
        source_vm_name:              "{{ backup_restore_vm_name }}"
      register:                      pre_backup_discovery
      run_once:                      true
      failed_when:                   pre_backup_discovery.protected_items | default([]) | length == 0

    - name:                         "Pre Validation: Set source items from filtered discovery"
      ansible.builtin.set_fact:
        backup_source_items:        "{{ pre_backup_discovery.protected_items }}"
      run_once:                     true

    - name:                         "Pre Validation: Log source filter results"
      ansible.builtin.debug:
        msg: >-
          Found {{ backup_source_items | length }} protected item(s) for source VM
          '{{ backup_restore_vm_name }}'.
          Databases: {{ backup_source_items | map(attribute='name') | list }}
      run_once:                     true

    - name:                         "Pre Validation: Separate SYSTEMDB and tenant databases"
      ansible.builtin.set_fact:
        backup_systemdb_items:      "{{ backup_source_items
                                        | selectattr('name','match','(?i)^systemdb$')
                                        | list }}"
        backup_tenant_items:        "{{ backup_source_items
                                        | rejectattr('name','match','(?i)^systemdb$')
                                        | list }}"
      run_once:                     true

    - name:                         "Pre Validation: Apply restore scope parameters"
      ansible.builtin.set_fact:
        backup_systemdb_items:      "{{ backup_systemdb_items
                                        if (backup_restore_systemdb | default(true) | bool)
                                        else [] }}"
        backup_tenant_items:        "{{ (backup_tenant_items
                                        | selectattr('name', 'in', backup_restore_tenants | map('lower') | list)
                                        | list)
                                        if (backup_restore_tenants | default([]) | length > 0)
                                        else backup_tenant_items }}"
      run_once:                     true

    - name:                         "Pre Validation: Log discovered databases"
      ansible.builtin.debug:
        msg: >-
          Discovered {{ backup_source_items | length }} database(s) from source VM '{{ backup_restore_vm_name }}'.
          Restoring: SYSTEMDB: {{ backup_systemdb_items | map(attribute='name') | list | join(', ') | default('skipped') }},
          Tenants: {{ backup_tenant_items | map(attribute='name') | list | join(', ') | default('none') }}.
          Target path: {{ backup_target_filesystem_path }}.
          Parameters: restore_systemdb={{ backup_restore_systemdb | default(true) }},
          restore_tenants={{ backup_restore_tenants | default([]) }}
      run_once:                     true

    - name:                         "Pre Validation: Set pre-validation status"
      ansible.builtin.set_fact:
        pre_validations_status:     "{{ 'PASSED' if (
                                        (backup_systemdb_items | length > 0 or backup_tenant_items | length > 0)
                                        and fs_path_check is not failed
                                      ) else 'FAILED' }}"
      run_once:                     true

# /*---------------------------------------------------------------------------
# |                          Test Execution                                   |
# +--------------------------------------------------------------------------*/
- name:                             "Test Execution: Restore backup to filesystem and recover"
  when:
                                    - node_tier == "hana"
                                    - pre_validations_status == "PASSED"
  become:                           true
  tags:                                 [test-execution]
  block:
    - name:                         "Test Execution: Start timer"
      ansible.builtin.set_fact:
        test_execution_start:       "{{ now(utc=true, fmt='%Y-%m-%d %H:%M:%S') }}"
        test_execution_hostname:    "{{ ansible_hostname }}"
      run_once:                     true

    - name:                         "Test Execution: Put cluster in maintenance mode"
      when:                         database_high_availability | default(false) | bool
      ansible.builtin.include_tasks: "roles/backup_db_hana/tasks/includes/cluster-maintenance-on.yml"

    - name:                         "Test Execution: HSR - Teardown replication before restore"
      ansible.builtin.include_tasks: "roles/backup_db_hana/tasks/includes/hsr-teardown.yml"

    - name:                         "Test Execution: Stop HANA DB before restore"
      become:                       true
      become_user:                  "{{ db_sid | lower }}adm"
      ansible.builtin.shell: |
                                    set -o pipefail
                                    source /usr/sap/{{ db_sid | upper }}/home/.sapenv.sh && \
                                    HDB stop
      args:
        executable:                 /bin/bash
      register:                     hana_stop_result
      delegate_to:                  "{{ backup_primary_node }}"
      run_once:                     true
      changed_when:                 hana_stop_result.rc == 0

    - name:                         "Test Execution: Clean target filesystem path"
      ansible.builtin.file:
        path:                       "{{ backup_target_filesystem_path }}"
        state:                      "{{ item_state }}"
        mode:                       "0755"
      loop:
        - absent
        - directory
      loop_control:
        loop_var:                   item_state
      delegate_to:                  "{{ backup_primary_node }}"
      run_once:                     true

    - name:                         "Test Execution: Create per-DB subdirectory for SYSTEMDB"
      ansible.builtin.file:
        path:                       "{{ backup_target_filesystem_path }}/{{ db_item.name | lower }}"
        state:                      directory
        mode:                       "0755"
      loop:                         "{{ backup_systemdb_items }}"
      loop_control:
        loop_var:                   db_item
        label:                      "{{ db_item.name }}"
      delegate_to:                  "{{ backup_primary_node }}"
      run_once:                     true
      when:                         backup_systemdb_items | length > 0

    - name:                         "Test Execution: Restore SYSTEMDB '{{ db_item.name | default('') }}' to filesystem"
      delegate_to:                  localhost
      azure_backup_hana:
        operation:                  "restore_to_filesystem"
        vault_resource_id:          "{{ backup_vault_resource_id }}"
        subscription_id:            "{{ backup_restore_subscription }}"
        msi_client_id:              "{{ user_assigned_identity_client_id | default('') }}"
        container_name:             "{{ db_item.container_name }}"
        item_name:                  "{{ db_item.item_name }}"
        target_filesystem_path:     "{{ backup_target_filesystem_path }}/{{ db_item.name | lower }}"
        target_vm_name:             "{{ backup_restore_vm_name }}"
        target_vm_resource_group:   "{{ backup_restore_vm_rg }}"
        restore_point_time:         "{{ backup_restore_point_time | default('') }}"
        source_resource_id:         >-
          {{ '/subscriptions/' ~ backup_restore_subscription
             ~ '/resourceGroups/' ~ backup_restore_vm_rg
             ~ '/providers/Microsoft.Compute/virtualMachines/'
             ~ backup_restore_vm_name }}
      register:                     systemdb_fs_restore_results
      run_once:                     true
      loop:                         "{{ backup_systemdb_items }}"
      loop_control:
        loop_var:                   db_item
        label:                      "{{ db_item.name }}"
      when:                         backup_systemdb_items | length > 0

    - name:                         "Test Execution: Wait for SYSTEMDB filesystem restore - debug"
      ansible.builtin.debug:
        msg: >-
          Waiting for SYSTEMDB filesystem restore jobs to complete.
          {{ systemdb_fs_restore_results.results | default([]) }}
      run_once:                     true
      when:
                                    - systemdb_fs_restore_results is defined
                                    - systemdb_fs_restore_results.results | default([]) | length > 0

    - name:                         "Test Execution: Wait for SYSTEMDB filesystem restore to complete"
      delegate_to:                  localhost
      azure_backup_hana:
        operation:                  "check_restore_job"
        vault_resource_id:          "{{ backup_vault_resource_id }}"
        subscription_id:            "{{ backup_restore_subscription }}"
        msi_client_id:              "{{ user_assigned_identity_client_id | default('') }}"
        restore_job_id:             "{{ db_restore.restore_job.job_id }}"
        poll_interval_seconds:      "{{ backup_poll_interval | default(30) }}"
        poll_timeout_seconds:       "{{ backup_poll_timeout | default(7200) }}"
      register:                     systemdb_fs_job_statuses
      run_once:                     true
      loop:                         "{{ systemdb_fs_restore_results.results | default([]) }}"
      loop_control:
        loop_var:                   db_restore
        label:                      "{{ db_restore.db_item.name | default('N/A') }}"
      when:
        - systemdb_fs_restore_results is defined
        - systemdb_fs_restore_results is not skipped
        - db_restore.restore_job is defined
        - db_restore.restore_job.job_id | default('') | length > 0

    - name:                         "Test Execution: Create per-DB subdirectory for tenants"
      ansible.builtin.file:
        path:                       "{{ backup_target_filesystem_path }}/{{ db_item.name | lower }}"
        state:                      directory
        mode:                       "0755"
      loop:                         "{{ backup_tenant_items }}"
      loop_control:
        loop_var:                   db_item
        label:                      "{{ db_item.name }}"
      delegate_to:                  "{{ backup_primary_node }}"
      run_once:                     true
      when:                         backup_tenant_items | length > 0

    - name:                         "Test Execution: Restore tenant '{{ db_item.name | default('') }}' to filesystem"
      delegate_to:                  localhost
      azure_backup_hana:
        operation:                  "restore_to_filesystem"
        vault_resource_id:          "{{ backup_vault_resource_id }}"
        subscription_id:            "{{ backup_restore_subscription }}"
        msi_client_id:              "{{ user_assigned_identity_client_id | default('') }}"
        container_name:             "{{ db_item.container_name }}"
        item_name:                  "{{ db_item.item_name }}"
        target_filesystem_path:     "{{ backup_target_filesystem_path }}/{{ db_item.name | lower }}"
        target_vm_name:             "{{ backup_restore_vm_name }}"
        target_vm_resource_group:   "{{ backup_restore_vm_rg }}"
        restore_point_time:         "{{ backup_restore_point_time | default('') }}"
        source_resource_id:         >-
          {{ '/subscriptions/' ~ backup_restore_subscription
             ~ '/resourceGroups/' ~ backup_restore_vm_rg
             ~ '/providers/Microsoft.Compute/virtualMachines/'
             ~ backup_restore_vm_name }}
      register:                     tenant_fs_restore_results
      run_once:                     true
      loop:                         "{{ backup_tenant_items }}"
      loop_control:
        loop_var:                   db_item
        label:                      "{{ db_item.name }}"
      when:                         backup_tenant_items | length > 0

    - name:                         "Test Execution: Wait for tenant filesystem restore - debug"
      ansible.builtin.debug:
        msg: >-
          Waiting for tenant filesystem restore jobs to complete.
          {{ tenant_fs_restore_results.results | default([]) }}
      run_once:                     true
      when:
                                    - tenant_fs_restore_results is defined
                                    - tenant_fs_restore_results.results | default([]) | length > 0

    - name:                         "Test Execution: Wait for tenant filesystem restore to complete"
      delegate_to:                  localhost
      azure_backup_hana:
        operation:                  "check_restore_job"
        vault_resource_id:          "{{ backup_vault_resource_id }}"
        subscription_id:            "{{ backup_restore_subscription }}"
        msi_client_id:              "{{ user_assigned_identity_client_id | default('') }}"
        restore_job_id:             "{{ db_restore.restore_job.job_id }}"
        poll_interval_seconds:      "{{ backup_poll_interval | default(30) }}"
        poll_timeout_seconds:       "{{ backup_poll_timeout | default(7200) }}"
      register:                     tenant_fs_job_statuses
      run_once:                     true
      loop:                         "{{ tenant_fs_restore_results.results | default([]) }}"
      loop_control:
        loop_var:                   db_restore
        label:                      "{{ db_restore.db_item.name | default('N/A') }}"
      when:
        - tenant_fs_restore_results is defined
        - tenant_fs_restore_results is not skipped
        - db_restore.restore_job is defined
        - db_restore.restore_job.job_id | default('') | length > 0

    - name:                         "Test Execution: List restored backup files"
      ansible.builtin.find:
        paths:                      "{{ backup_target_filesystem_path }}"
        recurse:                    true
        file_type:                  file
      register:                     restored_files
      delegate_to:                  "{{ backup_primary_node }}"
      run_once:                     true

    - name:                         "Test Execution: Validate backup files exist"
      ansible.builtin.assert:
        that:
          - restored_files.files | length > 0
        fail_msg:                   "No backup files found at {{ backup_target_filesystem_path }}"
        success_msg:                "Found {{ restored_files.files | length }} backup file(s)"
      run_once:                     true

    - name:                         "Test Execution: Discover SYSTEMDB backup file prefix"
      ansible.builtin.shell: |
                                    set -o pipefail
                                    ls -1 {{ backup_target_filesystem_path }}/{{ (backup_systemdb_items[0].name | default('systemdb')) | lower }}/Data/*_databackup_0_1 2>/dev/null \
                                      | head -1 | xargs basename | sed 's/_databackup_0_1$//'
      args:
        executable:                 /bin/bash
      register:                     systemdb_backup_prefix
      delegate_to:                  "{{ backup_primary_node }}"
      run_once:                     true
      changed_when:                 false

    - name:                         "Test Execution: Discover tenant backup file prefixes"
      ansible.builtin.shell: |
                                    set -o pipefail
                                    ls -1 {{ backup_target_filesystem_path }}/{{ db_item.name | lower }}/Data/*_databackup_0_1 2>/dev/null \
                                      | head -1 | xargs basename | sed 's/_databackup_0_1$//'
      args:
        executable:                 /bin/bash
      register:                     tenant_backup_prefixes
      delegate_to:                  "{{ backup_primary_node }}"
      run_once:                     true
      changed_when:                 false
      loop:                         "{{ backup_tenant_items | default([]) }}"
      loop_control:
        loop_var:                   db_item
        label:                      "{{ db_item.name }}"

    - name:                         "Test Execution: Log discovered backup prefixes"
      ansible.builtin.debug:
        msg: >-
          SYSTEMDB prefix: '{{ systemdb_backup_prefix.stdout }}'.
          Tenant prefixes: {{ tenant_backup_prefixes.results | default([]) | map(attribute='stdout') | list }}
      run_once:                     true

    - name:                         "Test Execution: Recover SYSTEMDB from backup files"
      become:                       true
      become_user:                  "{{ db_sid | lower }}adm"
      ansible.builtin.shell: |
                                    set -o pipefail
                                    source /usr/sap/{{ db_sid | upper }}/home/.sapenv.sh && \
                                    HDBSettings.sh recoverSys.py \
                                      --command="RECOVER DATA USING FILE ('{{ backup_target_filesystem_path }}/{{ (backup_systemdb_items[0].name | default('systemdb')) | lower }}/Data/{{ systemdb_backup_prefix.stdout }}') CLEAR LOG" \
                                      --timeout={{ backup_recover_timeout | default(3600) }}
      args:
        executable:                 /bin/bash
      register:                     hana_file_recover_result
      delegate_to:                  "{{ backup_primary_node }}"
      run_once:                     true

    - name:                         "Test Execution: Start HANA DB after recovery"
      become:                       true
      become_user:                  "{{ db_sid | lower }}adm"
      ansible.builtin.shell: |
                                    set -o pipefail
                                    source /usr/sap/{{ db_sid | upper }}/home/.sapenv.sh && \
                                    HDB start
      args:
        executable:                 /bin/bash
      register:                     hana_start_result
      delegate_to:                  "{{ backup_primary_node }}"
      run_once:                     true
      changed_when:                 hana_start_result.rc == 0

    - name:                         "Test Execution: Wait for SQL connectivity after recovery"
      ansible.builtin.include_tasks: "roles/backup_db_hana/tasks/includes/wait-for-sql.yml"
      vars:
        wait_sql_delegate_to:       "{{ backup_primary_node }}"
      when:                         backup_tenant_items | length > 0

    - name:                         "Test Execution: Recover tenant DB from backup files"
      become:                       true
      become_user:                  "{{ db_sid | lower }}adm"
      ansible.builtin.shell: |
                                    set -o pipefail
                                    source /usr/sap/{{ db_sid | upper }}/home/.sapenv.sh && \
                                    hdbsql -U {{ hana_userstore_key | default('SYSTEM') }} -j \
                                      "RECOVER DATA FOR {{ db_item.name | upper }} USING FILE ('{{ backup_target_filesystem_path }}/{{ db_item.name | lower }}/Data/{{ tenant_backup_prefixes.results[idx].stdout }}') CLEAR LOG"
      args:
        executable:                 /bin/bash
      register:                     tenant_recover_result
      delegate_to:                  "{{ backup_primary_node }}"
      run_once:                     true
      loop:                         "{{ backup_tenant_items | default([]) }}"
      loop_control:
        loop_var:                   db_item
        index_var:                  idx
        label:                      "{{ db_item.name }}"

    - name:                         "Test Execution: Start tenant DB after recovery"
      become:                       true
      become_user:                  "{{ db_sid | lower }}adm"
      ansible.builtin.shell: |
                                    set -o pipefail
                                    source /usr/sap/{{ db_sid | upper }}/home/.sapenv.sh && \
                                    hdbsql -U {{ hana_userstore_key | default('SYSTEM') }} -j \
                                      "ALTER SYSTEM START DATABASE {{ db_item.name }}"
      args:
        executable:                 /bin/bash
      register:                     tenant_start_result
      delegate_to:                  "{{ backup_primary_node }}"
      run_once:                     true
      changed_when:                 true
      loop:                         "{{ backup_tenant_items | default([]) }}"
      loop_control:
        loop_var:                   db_item
        label:                      "{{ db_item.name }}"

    - name:                         "Test Execution: HSR - Re-establish replication"
      when:                         database_high_availability | default(false) | bool
      ansible.builtin.include_tasks: "roles/backup_db_hana/tasks/includes/hsr-reestablish.yml"

    - name:                         "Test Execution: Compute restore results summary"
      ansible.builtin.set_fact:
        systemdb_all_ok:            "{{ (systemdb_fs_job_statuses.results | default([])
                                        | selectattr('restore_job','defined')
                                        | map(attribute='restore_job.status')
                                        | map('lower')
                                        | reject('equalto','completed')
                                        | list | length == 0)
                                        if (systemdb_fs_job_statuses is defined and systemdb_fs_job_statuses is not skipped)
                                        else (backup_systemdb_items | length == 0) }}"
        tenant_all_ok:              "{{ (tenant_fs_job_statuses.results | default([])
                                        | selectattr('restore_job','defined')
                                        | map(attribute='restore_job.status')
                                        | map('lower')
                                        | reject('equalto','completed')
                                        | list | length == 0)
                                        if (tenant_fs_job_statuses is defined and tenant_fs_job_statuses is not skipped)
                                        else (backup_tenant_items | length == 0) }}"
      run_once:                     true

    - name:                         "Test Execution: Determine test execution status (HSR)"
      when:                         database_high_availability | default(false) | bool
      ansible.builtin.set_fact:
        test_execution_status:      "{{ 'PASSED' if (
                                        systemdb_all_ok | bool
                                        and tenant_all_ok | bool
                                        and restored_files.files | length > 0
                                        and hsr_register_result.rc | default(1) == 0
                                      ) else 'FAILED' }}"
      run_once:                     true

    - name:                         "Test Execution: Determine test execution status (standalone)"
      when:                         not (database_high_availability | default(false) | bool)
      ansible.builtin.set_fact:
        test_execution_status:      "{{ 'PASSED' if (
                                        systemdb_all_ok | bool
                                        and tenant_all_ok | bool
                                        and restored_files.files | length > 0
                                      ) else 'FAILED' }}"
      run_once:                     true

    - name:                         "Test Execution: Stop timer"
      ansible.builtin.set_fact:
        test_execution_end:         "{{ now(utc=true, fmt='%Y-%m-%d %H:%M:%S') }}"
      run_once:                     true

    - name:                         "Set test case message and details (standalone)"
      ansible.builtin.set_fact:
        test_case_message_from_test_case: >-
          Restore-to-filesystem for {{ backup_source_items | length }} DB(s):
          SYSTEMDB: {{ systemdb_all_ok }}, Tenants: {{ tenant_all_ok }},
          Backup files found: {{ restored_files.files | length }},
        test_case_details_from_test_case:
          topology:                 "Standalone"
          databases_restored:       "{{ backup_source_items | map(attribute='name') | list }}"
          systemdb_results:         "{{ systemdb_fs_restore_results.results | default([]) }}"
          systemdb_job_statuses:    "{{ systemdb_fs_job_statuses.results | default([]) }}"
          tenant_results:           "{{ tenant_fs_restore_results.results | default([]) }}"
          tenant_job_statuses:      "{{ tenant_fs_job_statuses.results | default([]) }}"
          restored_files_count:     "{{ restored_files.files | length }}"
          hana_file_recover:        "{{ hana_file_recover_result }}"
          hana_start:               "{{ hana_start_result }}"
      run_once:                     true
      when:                         not (database_high_availability | default(false) | bool)

    - name:                         "Set test case message and details (HSR)"
      ansible.builtin.set_fact:
        test_case_message_from_test_case: >-
          Restore-to-filesystem (HSR) for {{ backup_source_items | length }} DB(s):
          SYSTEMDB: {{ systemdb_all_ok }}, Tenants: {{ tenant_all_ok }},
          Backup files found: {{ restored_files.files | length }},
          HSR re-established: {{ (hsr_register_result.rc | default(1)) == 0 }}
        test_case_details_from_test_case:
          topology:                 "HSR"
          databases_restored:       "{{ backup_source_items | map(attribute='name') | list }}"
          systemdb_results:         "{{ systemdb_fs_restore_results.results | default([]) }}"
          systemdb_job_statuses:    "{{ systemdb_fs_job_statuses.results | default([]) }}"
          tenant_results:           "{{ tenant_fs_restore_results.results | default([]) }}"
          tenant_job_statuses:      "{{ tenant_fs_job_statuses.results | default([]) }}"
          restored_files_count:     "{{ restored_files.files | length }}"
          hana_file_recover:        "{{ hana_file_recover_result }}"
          hana_stop:                "{{ hana_stop_result }}"
          hana_start:               "{{ hana_start_result }}"
          cluster_status_pre:       "{{ cluster_status_pre | default({}) }}"
          hsr_disable:              "{{ hsr_disable_result | default({}) }}"
          hsr_unregister:           "{{ hsr_unregister_result | default({}) }}"
          hsr_enable:               "{{ hsr_enable_result | default({}) }}"
          hsr_register:             "{{ hsr_register_result | default({}) }}"
          hsr_state:                "{{ hsr_state_result | default({}) }}"
      run_once:                     true
      when:                         database_high_availability | default(false) | bool

    - name:                         "Post Validations Tasks"
      ansible.builtin.include_tasks: "roles/backup_db_hana/tasks/post-validations-backup.yml"
      tags:                             [post-validation]
      run_once:                     true

  rescue:
    - name:                             "Rescue operation"
      ansible.builtin.include_tasks:    "roles/backup_db_hana/tasks/rescue-backup.yml"
      tags:                             [cleanup]
      run_once:                         true

- name:                                 "Pre Validations: Test Case Skipped"
  when:                                 pre_validations_status | default('FAILED') == "FAILED"
  block:
    - name:                             "Set test case message and details"
      ansible.builtin.set_fact:
        test_case_message_from_test_case: >-
          Pre Validations for restore-to-filesystem failed.
          Source VM items: {{ backup_source_items | default([]) | length }},
          Filesystem path check: {{ fs_path_check is not failed }}
        test_case_details_from_test_case:
          pre_validation:               "{{ backup_source_items | default([]) }}"
          fs_path_check:                "{{ fs_path_check | default({}) }}"
      run_once:                         true

    - name:                             "Post Validations Tasks"
      ansible.builtin.include_tasks:    "roles/backup_db_hana/tasks/post-validations-backup.yml"
      tags:                             [post-validation]
      run_once:                         true
