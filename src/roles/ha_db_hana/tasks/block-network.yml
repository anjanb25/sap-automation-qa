# /*---------------------------------------------------------------------------
# |                          Block Network Communication                       |
# +--------------------------------------------------------------------------*/
- name:                                     "Test Setup Tasks"
  ansible.builtin.include_tasks:            "roles/misc/tasks/test-case-setup.yml"
  run_once:                                 true
  tags:                                     [pre-validation]

# /*---------------------------------------------------------------------------
# |                          Pre Validations                                  |
# +--------------------------------------------------------------------------*/
- name:                                     "Pre Validations: HANA DB Nodes"
  ansible.builtin.include_tasks:            "roles/misc/tasks/pre-validations-db.yml"
  tags:                                     [pre-validation]

# /*---------------------------------------------------------------------------
# |                          Test Execution                                   |
# +--------------------------------------------------------------------------*/
- name:                                     "Test Execution: Block Network Communication"
  become:                                   true
  when:
                                            - node_tier == "hana"
                                            - pre_validations_status == "PASSED"
                                            - cluster_status_pre.stonith_action == "reboot"
                                            - hana_topology == 'scale_out_hsr' or
                                              (
                                                cluster_status_pre.PRIORITY_FENCING_DELAY is defined and
                                                cluster_status_pre.PRIORITY_FENCING_DELAY != "" and
                                                cluster_status_pre.PRIORITY_FENCING_DELAY != "unknown"
                                              )
  tags:                                     [test-execution]
  block:
    - name:                                 "Test Execution: Start timer"
      when:                                 ansible_hostname == cluster_status_pre.primary_node
      ansible.builtin.set_fact:
        test_execution_start:               "{{ now(utc=true, fmt='%Y-%m-%d %H:%M:%S') }}"
        test_execution_hostname:            "{{ hostvars[cluster_status_pre.primary_node].ansible_hostname }}"

    - name:                                 "Test Execution: Block all network communication on primary site"
      become:                               true
      ansible.builtin.shell:                "sleep 3; iptables -P INPUT DROP; iptables -P OUTPUT DROP"
      async:                                15
      poll:                                 0
      register:                             firewall_rule_created
      when: >-
                                            (hana_topology | default('scale_up') == 'scale_out_hsr' and
                                             ansible_hostname in cluster_status_pre.primary_site_nodes)
                                            or
                                            (hana_topology | default('scale_up') != 'scale_out_hsr' and
                                             ansible_hostname == cluster_status_pre.primary_node)

    - name:                                 "Test Execution: Switch to secondary node"
      when:                                 ansible_hostname == cluster_status_pre.secondary_node
      tags:                                 [test-execution]
      block:
        - name:                             "Test Execution: Wait for the cluster to be in a stable state"
          ansible.builtin.wait_for:
            timeout:                        "{{ default_timeout }}"

        - name:                             "Test Execution: Validate HANA DB cluster status (secondary takes over)"
          get_cluster_status_db:
            db_instance_number:             "{{ db_instance_number }}"
            operation_step:                 "test_execution"
            database_sid:                   "{{ db_sid | lower }}"
            saphanasr_provider:             "{{ saphanasr_provider | default('SAPHanaSR') }}"
            hana_clone_resource_name:       "{{ hana_clone_resource_name | default('') }}"
            hana_primitive_resource_name:   "{{ hana_primitive_resource_name | default('') }}"
            hana_topology:                  "{{ hana_topology | default('scale_up') }}"
          register:                         cluster_status_test_execution
          retries:                          "{{ default_retries }}"
          delay:                            "{{ default_delay }}"
          until: >
                                            cluster_status_test_execution.primary_node != "" and
                                            (
                                              (hana_topology | default('scale_up') == 'scale_out_hsr' and
                                               cluster_status_test_execution.primary_node in cluster_status_pre.secondary_site_nodes and
                                               cluster_status_test_execution.secondary_node == "")
                                              or
                                              (hana_topology | default('scale_up') != 'scale_out_hsr' and
                                               cluster_status_test_execution.primary_node == cluster_status_pre.secondary_node and
                                               cluster_status_test_execution.secondary_node == "")
                                            )

        - name:                             "Test Execution: Wait for the cluster to be in a stable state"
          ansible.builtin.wait_for:
            timeout:                        "{{ default_timeout }}"

        - name:                             "Test Execution: Validate HANA DB cluster status (post recovery)"
          get_cluster_status_db:
            db_instance_number:             "{{ db_instance_number }}"
            operation_step:                 "test_execution"
            database_sid:                   "{{ db_sid | lower }}"
            saphanasr_provider:             "{{ saphanasr_provider | default('SAPHanaSR') }}"
            hana_clone_resource_name:       "{{ hana_clone_resource_name | default('') }}"
            hana_primitive_resource_name:   "{{ hana_primitive_resource_name | default('') }}"
            hana_topology:                  "{{ hana_topology | default('scale_up') }}"
          register:                         cluster_status_post
          retries:                          "{{ default_retries }}"
          delay:                            "{{ default_delay }}"
          ignore_errors:                    true
          until: >
                                            cluster_status_post.primary_node != "" and
                                            cluster_status_post.secondary_node != "" and
                                            (
                                              (hana_topology | default('scale_up') == 'scale_out_hsr' and
                                               cluster_status_post.primary_node in cluster_status_pre.secondary_site_nodes and
                                               cluster_status_post.primary_node != cluster_status_pre.primary_node)
                                              or
                                              (hana_topology | default('scale_up') != 'scale_out_hsr' and
                                               cluster_status_post.primary_node == cluster_status_pre.secondary_node and
                                               cluster_status_post.secondary_node == cluster_status_pre.primary_node)
                                            ) and
                                            (cluster_status_post.worker_node_scores_valid | default(false))

        - name:                             "Test Execution: Set resource cleanup required flag"
          ansible.builtin.set_fact:
            cleanup_failed_resource_post_required: "{{ cluster_status_post is failed }}"

        - name:                             "Test Execution: CleanUp failed SAPHanaController resource"
          when:                             cleanup_failed_resource_post_required | bool
          ansible.builtin.command:          crm_resource --cleanup
          register:                         cleanup_failed_resource_post
          retries:                          3
          delay:                            "{{ default_delay }}"
          until:                            cleanup_failed_resource_post.rc == 0
          changed_when:                     cleanup_failed_resource_post.rc == 0
          ignore_errors:                    true

        - name:                             "Test Execution: Wait for cluster to recover after resource cleanup"
          when:                             cleanup_failed_resource_post_required | bool
          ansible.builtin.wait_for:
            timeout:                        "{{ default_timeout }}"

        - name:                             "Test Execution: Validate HANA DB cluster status (post cleanup)"
          when:                             cleanup_failed_resource_post_required | bool
          get_cluster_status_db:
            db_instance_number:             "{{ db_instance_number }}"
            operation_step:                 "test_execution"
            database_sid:                   "{{ db_sid | lower }}"
            saphanasr_provider:             "{{ saphanasr_provider | default('SAPHanaSR') }}"
            hana_clone_resource_name:       "{{ hana_clone_resource_name | default('') }}"
            hana_primitive_resource_name:   "{{ hana_primitive_resource_name | default('') }}"
            hana_topology:                  "{{ hana_topology | default('scale_up') }}"
          register:                         cluster_status_post_retry
          retries:                          "{{ default_retries }}"
          delay:                            "{{ default_delay }}"
          until: >
                                            cluster_status_post_retry.primary_node != "" and
                                            cluster_status_post_retry.secondary_node != "" and
                                            (
                                              (hana_topology | default('scale_up') == 'scale_out_hsr' and
                                               cluster_status_post_retry.primary_node in cluster_status_pre.secondary_site_nodes and
                                               cluster_status_post_retry.primary_node != cluster_status_pre.primary_node)
                                              or
                                              (hana_topology | default('scale_up') != 'scale_out_hsr' and
                                               cluster_status_post_retry.primary_node == cluster_status_pre.secondary_node and
                                               cluster_status_post_retry.secondary_node == cluster_status_pre.primary_node)
                                            ) and
                                            (cluster_status_post_retry.worker_node_scores_valid | default(false))

        - name:                             "Test Execution: Use retried post-recovery cluster status"
          when:                             cleanup_failed_resource_post_required | bool
          ansible.builtin.set_fact:
            cluster_status_post:            "{{ cluster_status_post_retry }}"

    - name:                                 "Test Execution: Switch back to primary node"
      when:                                 ansible_hostname == cluster_status_pre.primary_node
      tags:                                 [test-execution]
      block:
        - name:                             "Test Execution: Stop timer"
          ansible.builtin.set_fact:
            test_execution_end:             "{{ now(utc=true, fmt='%Y-%m-%d %H:%M:%S') }}"

        - name:                             "Test Execution: Set cluster status from secondary"
          ansible.builtin.set_fact:
            cluster_status_post:            "{{ hostvars[cluster_status_pre.secondary_node].cluster_status_post }}"
            cluster_status_test_execution:  "{{ hostvars[cluster_status_pre.secondary_node].cluster_status_test_execution }}"
            cleanup_failed_resource_post:   "{{ hostvars[cluster_status_pre.secondary_node].cleanup_failed_resource_post | default('Not Executed') }}"

        - name:                             "Test Execution: Determine test execution status"
          ansible.builtin.set_fact:
            test_execution_status:          "{{ 'PASSED' if (
                                              (hana_topology | default('scale_up') == 'scale_out_hsr' and
                                               cluster_status_post.primary_node in cluster_status_pre.secondary_site_nodes and
                                               cluster_status_post.primary_node != cluster_status_pre.primary_node)
                                              or
                                              (hana_topology | default('scale_up') != 'scale_out_hsr' and
                                               cluster_status_post.primary_node == cluster_status_pre.secondary_node and
                                               cluster_status_post.secondary_node == cluster_status_pre.primary_node)
                                            ) else 'FAILED' }}"

        - name:                             "Set test case message and details"
          ansible.builtin.set_fact:
            test_case_message_from_test_case: |
                                            "Old primary: {{ cluster_status_pre.primary_node }} \
                                            New primary: {{ cluster_status_post.primary_node }} \
                                            Old secondary: {{ cluster_status_pre.secondary_node }} \
                                            New secondary: {{ cluster_status_post.secondary_node }}"
            test_case_details_from_test_case: {
                                            "Pre Validations: Remove any location_constraints": "{{ location_constraints_results }}",
                                            "Pre Validations: Validate HANA DB cluster status": "{{ cluster_status_pre }}",
                                            "Pre Validations: CleanUp any failed resource": "{{ cleanup_failed_resource_pre | default('Not Executed') }}",
                                            "Test Execution: Network blocked on primary site": "{{ firewall_rule_created | default('iptables -P DROP applied') }}",
                                            "Test Execution: Cluster Status after the network blocked": "{{ cluster_status_test_execution }}",
                                            "Test Execution: Firewall removed by": "Primary site nodes rebooted by fencing",
                                            "Test Execution: CleanUp failed resource (post recovery)": "{{ cleanup_failed_resource_post | default('Not Executed') }}",
                                            "Post Validations: Validate HANA DB cluster status": "{{ cluster_status_post }}",
                                            }

  rescue:
    - name:                                 "Test Execution Failure: Reset iptables policies on primary site nodes"
      become:                               true
      ansible.builtin.shell:                "iptables -P INPUT ACCEPT; iptables -P OUTPUT ACCEPT"
      register:                             firewall_rule_deleted
      changed_when:                         firewall_rule_deleted.rc == 0
      failed_when:                          false
      ignore_unreachable:                   true
      when: >-
                                            (hana_topology | default('scale_up') == 'scale_out_hsr' and
                                             ansible_hostname in (cluster_status_pre.primary_site_nodes | default([])))
                                            or
                                            (hana_topology | default('scale_up') != 'scale_out_hsr' and
                                             ansible_hostname == cluster_status_pre.primary_node)

    - name:                                 "Rescue operation"
      ansible.builtin.include_tasks:        "roles/misc/tasks/rescue.yml"
      tags:                                 [cleanup]

  always:
    - name:                                 "Post Validations Tasks"
      ansible.builtin.include_tasks:        "roles/misc/tasks/post-validations.yml"
      tags:                                 [post-validation]

- name:                                     "Test Execution: Block Network Communication"
  become:                                   true
  when:                                     pre_validations_status == "FAILED"
  tags:                                     [test-execution]
  block:
    - name:                                 "Set test case message and details"
      ansible.builtin.set_fact:
        test_case_message_from_test_case:   "Pre Validations for HANA DB cluster status checks failed. Please check the details."
        test_case_details_from_test_case:   {
                                            "Pre Validations: Remove any location_constraints": "{{ location_constraints_results }}",
                                            "Pre Validations: Validate HANA DB cluster status": "{{ cluster_status_pre }}",
                                            "Pre Validations: priority-fencing-delay": "{{ cluster_status_pre.PRIORITY_FENCING_DELAY | default('Not Configured') }}",
                                            "Pre Validations: CleanUp any failed resource": "{{ cleanup_failed_resource_pre | default('Not Executed') }}",
                                            "Cluster Status": "{{ cluster_status_pre }}",
                                            }

    - name:                                 "Post Validations Tasks"
      ansible.builtin.include_tasks:        "roles/misc/tasks/post-validations.yml"
      tags:                                 [post-validation]
