# /*---------------------------------------------------------------------------
# |               Crash the secondary node with echo b                        |
# +--------------------------------------------------------------------------*/
- name:                                 "Test Setup: {{ item.name | default('') }} - Initialize Test Case"
  ansible.builtin.include_tasks:        "roles/misc/tasks/test-case-setup.yml"
  run_once:                             true
  tags:                                 [pre-validation]


# /*---------------------------------------------------------------------------
# |                          Pre Validations                                  |
# +--------------------------------------------------------------------------*/
- name:                                 "Pre Validation: {{ item.name | default('') }} - HANA DB Nodes"
  ansible.builtin.include_tasks:        "roles/misc/tasks/pre-validations-db.yml"
  tags:                                 [pre-validation]

# /*---------------------------------------------------------------------------
# |                          Test Execution                                   |
# +--------------------------------------------------------------------------*/
- name:                                 "Test Execution: {{ item.name | default('') }} - Secondary Node Crash with echo b init"
  become:                               true
  when:
                                        - node_tier == "hana"
                                        - pre_validations_status == "PASSED"
                                        - cluster_status_pre.stonith_action == "reboot"
  tags:                                 [test-execution]
  block:
    - name:                             "Test Execution: {{ item.name | default('') }} - Crash the secondary node with echo b init"
      when:                             ansible_hostname == cluster_status_pre.primary_node
      tags:                             [test-execution]
      block:
        - name:                         "Test Execution: {{ item.name | default('') }} - Start timer"
          ansible.builtin.set_fact:
            test_execution_start:       "{{ now(utc=true, fmt='%Y-%m-%d %H:%M:%S') }}"
            test_execution_hostname:    "{{ hostvars[cluster_status_pre.secondary_node].ansible_hostname }}"

    - name:                             "Test Execution: {{ item.name | default('') }} - Crash the secondary node with echo b init"
      when:                             ansible_hostname == cluster_status_pre.secondary_node
      tags:                             [test-execution]
      block:
        - name:                         "Test Execution: {{ item.name | default('') }} - Echo b"
          become:                       true
          ansible.builtin.shell:        echo b > /proc/sysrq-trigger
          async:                        1
          poll:                         0
          ignore_errors:                true
          register:                     echo_b_result

    - name:                             "Test Execution: {{ item.name | default('') }} - Switch to secondary node"
      when:                             ansible_hostname == cluster_status_pre.primary_node
      tags:                             [test-execution]
      block:
        - name:                         "Test Execution: {{ item.name | default('') }} - Validate HANA DB cluster status"
          get_cluster_status_db:
            db_instance_number:         "{{ db_instance_number }}"
            operation_step:             "test_execution"
            database_sid:               "{{ db_sid | lower }}"
            saphanasr_provider:         "{{ saphanasr_provider | default('SAPHanaSR') }}"
            hana_clone_resource_name:   "{{ hana_clone_resource_name | default('') }}"
            hana_primitive_resource_name: "{{ hana_primitive_resource_name | default('') }}"
            hana_topology:                "{{ hana_topology | default('scale_up') }}"
          retries:                      "{{ default_retries }}"
          delay:                        "{{ default_delay }}"
          register:                     cluster_status_test_execution
          until: >
                                        cluster_status_test_execution.primary_node != "" and
                                        (
                                          (hana_topology | default('scale_up') == 'scale_out_hsr' and
                                           cluster_status_test_execution.primary_node in cluster_status_pre.primary_site_nodes and
                                           cluster_status_test_execution.secondary_node == "")
                                          or
                                          (hana_topology | default('scale_up') != 'scale_out_hsr' and
                                           cluster_status_test_execution.primary_node == cluster_status_pre.primary_node and
                                           cluster_status_test_execution.secondary_node == "")
                                        )

        - name:                         "Test Execution: {{ item.name | default('') }} - Validate HANA DB cluster status (post recovery)"
          get_cluster_status_db:
            db_instance_number:         "{{ db_instance_number }}"
            operation_step:             "post_failover"
            database_sid:               "{{ db_sid | lower }}"
            saphanasr_provider:         "{{ saphanasr_provider | default('SAPHanaSR') }}"
            hana_clone_resource_name:   "{{ hana_clone_resource_name | default('') }}"
            hana_primitive_resource_name: "{{ hana_primitive_resource_name | default('') }}"
            hana_topology:                "{{ hana_topology | default('scale_up') }}"
          register:                     cluster_status_post
          retries:                      "{{ default_retries }}"
          delay:                        "{{ default_delay }}"
          ignore_errors:                true
          until: >
                                        cluster_status_post.primary_node != "" and
                                        cluster_status_post.secondary_node != "" and
                                        (
                                          (hana_topology | default('scale_up') == 'scale_out_hsr' and
                                           cluster_status_post.primary_node in cluster_status_pre.primary_site_nodes and
                                           cluster_status_post.secondary_node in cluster_status_pre.secondary_site_nodes)
                                          or
                                          (hana_topology | default('scale_up') != 'scale_out_hsr' and
                                           cluster_status_post.primary_node == cluster_status_pre.primary_node and
                                           cluster_status_post.secondary_node == cluster_status_pre.secondary_node)
                                        ) and
                                        (cluster_status_post.worker_node_scores_valid | default(false))

        - name:                         "Test Execution: {{ item.name | default('') }} - Set resource cleanup required flag"
          ansible.builtin.set_fact:
            cleanup_failed_resource_post_required: "{{ cluster_status_post is failed }}"

        - name:                         "Test Execution: {{ item.name | default('') }} - CleanUp failed SAPHanaController resource"
          when:                         cleanup_failed_resource_post_required | bool
          ansible.builtin.command:      crm_resource --cleanup
          register:                     cleanup_failed_resource_post
          retries:                      3
          delay:                        "{{ default_delay }}"
          until:                        cleanup_failed_resource_post.rc == 0
          changed_when:                 cleanup_failed_resource_post.rc == 0
          ignore_errors:                true

        - name:                         "Test Execution: {{ item.name | default('') }} - Wait for cluster to recover after resource cleanup"
          when:                         cleanup_failed_resource_post_required | bool
          ansible.builtin.wait_for:
            timeout:                    "{{ default_timeout }}"

        - name:                         "Test Execution: {{ item.name | default('') }} - Validate HANA DB cluster status (post cleanup)"
          when:                         cleanup_failed_resource_post_required | bool
          get_cluster_status_db:
            db_instance_number:         "{{ db_instance_number }}"
            operation_step:             "post_failover"
            database_sid:               "{{ db_sid | lower }}"
            saphanasr_provider:         "{{ saphanasr_provider | default('SAPHanaSR') }}"
            hana_clone_resource_name:   "{{ hana_clone_resource_name | default('') }}"
            hana_primitive_resource_name: "{{ hana_primitive_resource_name | default('') }}"
            hana_topology:              "{{ hana_topology | default('scale_up') }}"
          register:                     cluster_status_post_retry
          retries:                      "{{ default_retries }}"
          delay:                        "{{ default_delay }}"
          until: >
                                        cluster_status_post_retry.primary_node != "" and
                                        cluster_status_post_retry.secondary_node != "" and
                                        (
                                          (hana_topology | default('scale_up') == 'scale_out_hsr' and
                                           cluster_status_post_retry.primary_node in cluster_status_pre.primary_site_nodes and
                                           cluster_status_post_retry.secondary_node in cluster_status_pre.secondary_site_nodes)
                                          or
                                          (hana_topology | default('scale_up') != 'scale_out_hsr' and
                                           cluster_status_post_retry.primary_node == cluster_status_pre.primary_node and
                                           cluster_status_post_retry.secondary_node == cluster_status_pre.secondary_node)
                                        ) and
                                        (cluster_status_post_retry.worker_node_scores_valid | default(false))

        - name:                         "Test Execution: {{ item.name | default('') }} - Use retried post-recovery cluster status"
          when:                         cleanup_failed_resource_post_required | bool
          ansible.builtin.set_fact:
            cluster_status_post:        "{{ cluster_status_post_retry }}"

        - name:                         "Test Execution: {{ item.name | default('') }} - Determine test execution status"
          ansible.builtin.set_fact:
            test_execution_status:      "{{ 'PASSED' if (
                                            (hana_topology | default('scale_up') == 'scale_out_hsr' and
                                             cluster_status_post.primary_node in cluster_status_pre.primary_site_nodes and
                                             cluster_status_post.secondary_node in cluster_status_pre.secondary_site_nodes)
                                            or
                                            (hana_topology | default('scale_up') != 'scale_out_hsr' and
                                             cluster_status_post.primary_node == cluster_status_pre.primary_node and
                                             cluster_status_post.secondary_node == cluster_status_pre.secondary_node)
                                          ) else 'FAILED' }}"

        - name:                         "Test Execution: {{ item.name | default('') }} - CleanUp any failed resource"
          ansible.builtin.command:      crm_resource --cleanup
          register:                     cleanup_failed_resource_post
          changed_when:                 cleanup_failed_resource_post.rc == 0
          ignore_errors:                true

        - name:                         "Test Execution: {{ item.name | default('') }} - Stop timer"
          ansible.builtin.set_fact:
            test_execution_end:         "{{ now(utc=true, fmt='%Y-%m-%d %H:%M:%S') }}"

        - name:                         "Report: {{ item.name | default('') }} - Set test case message and details"
          ansible.builtin.set_fact:
            test_case_message_from_test_case: |
                                        "Old primary: {{ cluster_status_pre.primary_node }} \
                                        New primary: {{ cluster_status_post.primary_node }} \
                                        Old secondary: {{ cluster_status_pre.secondary_node }} \
                                        New secondary: {{ cluster_status_post.secondary_node }}"
            test_case_details_from_test_case: {
                                        "Pre Validations: Remove any location_constraints": "{{ location_constraints_results }}",
                                        "Pre Validations: Validate HANA DB cluster status": "{{ cluster_status_pre }}",
                                        "Pre Validations: CleanUp any failed resource": "{{ cleanup_failed_resource_pre | default('Not Executed') }}",
                                        "Test Execution: Echo b results": "{{ hostvars[cluster_status_pre.secondary_node].echo_b_result | default('N/A') }}",
                                        "Post Validations: Validate HANA DB cluster status": "{{ cluster_status_post }}",
                                        }

  rescue:
    - name:                             "Rescue: {{ item.name | default('') }} - Handle Failure"
      ansible.builtin.include_tasks:    "roles/misc/tasks/rescue.yml"
      tags:                             [cleanup]

  always:
    - name:                             "Post Validation: {{ item.name | default('') }} - Validate Results"
      ansible.builtin.include_tasks:    "roles/misc/tasks/post-validations.yml"
      tags:                             [post-validation]

- name:                                 "Pre Validation: {{ item.name | default('') }} - Test Case Skipped"
  become:                               true
  when:                                 pre_validations_status == "FAILED"
  block:
    - name:                             "Report: {{ item.name | default('') }} - Set test case message and details"
      ansible.builtin.set_fact:
        test_case_message_from_test_case: "Pre Validations for HANA DB cluster status checks failed. Please check the details."
        test_case_details_from_test_case: {
                                          "Pre Validations: Remove any location_constraints": "{{ location_constraints_results }}",
                                          "Pre Validations: Validate HANA DB cluster status": "{{ cluster_status_pre }}",
                                          "Pre Validations: CleanUp any failed resource": "{{ cleanup_failed_resource_pre | default('Not Executed') }}",
                                          "Cluster Status": "{{ cluster_status_pre }}",
                                        }

    - name:                             "Post Validation: {{ item.name | default('') }} - Validate Results"
      ansible.builtin.include_tasks:    "roles/misc/tasks/post-validations.yml"
      tags:                             [post-validation]
