---
# /*---------------------------------------------------------------------------
# |                          ASCS Node Crash                                  |
# +--------------------------------------------------------------------------*/
- name:                                 "Test Setup: {{ item.name | default('') }} - Initialize Test Case"
  ansible.builtin.include_tasks:        "roles/misc/tasks/test-case-setup.yml"
  run_once:                             true
  tags:                                 [pre-validation]

# /*---------------------------------------------------------------------------
# |                          Pre Validations                                  |
# +--------------------------------------------------------------------------*/
- name:                                 "Pre Validation: {{ item.name | default('') }} - SCS Nodes"
  ansible.builtin.include_tasks:        "roles/misc/tasks/pre-validations-scs.yml"
  tags:                                 [pre-validation]

# /*---------------------------------------------------------------------------
# |                          Test Execution                                   |
# +--------------------------------------------------------------------------*/
- name:                                 "Test Execution: {{ item.name | default('') }} - ASCS Node Crash"
  become:                               true
  when:                                 pre_validations_status == "PASSED"
  tags:                                 [test-execution]
  block:
    - name:                             "Test Execution: {{ item.name | default('') }} - Check for ENSA version"
      ansible.builtin.command:            pgrep -f enq.sap{{ sap_sid | upper }}
      register:                         ensa2_check
      changed_when:                     false
      failed_when:                      false

    - name:                             "Test Execution: {{ item.name | default('') }} - Simulate ASCS Node Crash"
      when:                             ansible_hostname == cluster_status_pre.ascs_node
      become:                           true
      tags:                             [test-execution]
      block:
        - name:                         "Test Execution: {{ item.name | default('') }} - Start timer"
          ansible.builtin.set_fact:
            test_execution_start:       "{{ now(utc=true, fmt='%Y-%m-%d %H:%M:%S') }}"
            test_execution_hostname:    "{{ hostvars[cluster_status_pre.ascs_node].ansible_hostname }}"

        - name:                         "Test Execution: {{ item.name | default('') }} - Echo B to /proc/sysrq-trigger"
          ansible.builtin.shell:        echo b > /proc/sysrq-trigger
          async:                        1
          poll:                         0
          register:                     ascs_crash_result

    - name:                             "Test Execution: {{ item.name | default('') }} - Simulate ASCS Node Crash"
      when:                             ansible_hostname == cluster_status_pre.ers_node
      become:                           true
      tags:                             [test-execution]
      block:
        - name:                         "Test Execution: {{ item.name | default('') }} - Validate ASCS node has stopped"
          get_cluster_status_scs:
            sap_sid:                    "{{ sap_sid | lower }}"
          register:                     cluster_status_test_execution_pre
          retries:                      "{{ default_retries }}"
          delay:                        "{{ default_delay }}"
          until:                        cluster_status_test_execution_pre.ascs_node == ""

        - name:                         "Test Execution: {{ item.name | default('') }} - Validate SCS cluster status ENSA1"
          when:                         ensa2_check.stdout == ""
          get_cluster_status_scs:
            sap_sid:                    "{{ sap_sid | lower }}"
          register:                     cluster_status_test_execution_ensa1
          retries:                      "{{ default_retries }}"
          delay:                        "{{ default_delay }}"
          until: |
                                        cluster_status_test_execution_ensa1.ascs_node == cluster_status_pre.ers_node
                                        and cluster_status_test_execution_ensa1.ers_node == cluster_status_pre.ascs_node

        - name:                         "Test Execution: {{ item.name | default('') }} - Validate SCS cluster status ENSA2"
          when:                         ensa2_check.stdout != ""
          get_cluster_status_scs:
            sap_sid:                    "{{ sap_sid | lower }}"
          register:                     cluster_status_test_execution_ensa2
          retries:                      "{{ default_retries }}"
          delay:                        "{{ default_delay }}"
          until: |
                                        (cluster_status_test_execution_ensa2.ascs_node == cluster_status_pre.ers_node
                                        and cluster_status_test_execution_ensa2.ers_node == cluster_status_pre.ascs_node)
                                        or (cluster_status_test_execution_ensa2.ascs_node == cluster_status_pre.ascs_node
                                        and cluster_status_test_execution_ensa2.ers_node == cluster_status_pre.ers_node)

        - name:                         "Test Execution: {{ item.name | default('') }} - Set cluster status test execution result"
          ansible.builtin.set_fact:
            cluster_status_test_execution: "{{ cluster_status_test_execution_ensa1 if (cluster_status_test_execution_ensa1 is defined and cluster_status_test_execution_ensa1 is not skipped) else cluster_status_test_execution_ensa2 }}"

    - name:                             "Test Execution: {{ item.name | default('') }} - Simulate ASCS Node Crash"
      when:                             ansible_hostname == cluster_status_pre.ascs_node
      become:                           true
      tags:                             [test-execution]
      block:
        - name:                         "Test Execution: {{ item.name | default('') }} - Cleanup resources"
          ansible.builtin.command:      crm_resource --cleanup
          register:                     cleanup_failed_resource_test_execution
          changed_when:                 cleanup_failed_resource_test_execution.rc == 0

        - name:                         "Test Execution: {{ item.name | default('') }} - Determine test execution status"
          ansible.builtin.set_fact:
            test_execution_status:      "{{ 'PASSED' if (
                                            (hostvars[cluster_status_pre.ers_node].cluster_status_test_execution.ascs_node | default('') == cluster_status_pre.ers_node and
                                             hostvars[cluster_status_pre.ers_node].cluster_status_test_execution.ers_node | default('') == cluster_status_pre.ascs_node) or
                                            (hostvars[cluster_status_pre.ers_node].cluster_status_test_execution.ascs_node | default('') == cluster_status_pre.ascs_node and
                                             hostvars[cluster_status_pre.ers_node].cluster_status_test_execution.ers_node | default('') == cluster_status_pre.ers_node)
                                          ) else 'FAILED' }}"

        - name:                         "Test Execution: {{ item.name | default('') }} - Stop timer"
          ansible.builtin.set_fact:
            test_execution_end:         "{{ now(utc=true, fmt='%Y-%m-%d %H:%M:%S') }}"

        - name:                         "Report: {{ item.name | default('') }} - Set test case message and details"
          ansible.builtin.set_fact:
            test_case_message_from_test_case: |
                                        Old ASCS: {{ cluster_status_pre.ascs_node }}
                                        New ASCS: {{ hostvars[cluster_status_pre.ers_node].cluster_status_test_execution.ascs_node | default('N/A') }}
                                        Old ERS: {{ cluster_status_pre.ers_node }}
                                        New ERS: {{ hostvars[cluster_status_pre.ers_node].cluster_status_test_execution.ers_node | default('N/A') }}
            test_case_details_from_test_case: {
                                        "Pre Validations: Validate HANA DB cluster status": "{{ cluster_status_pre }}",
                                        "Pre Validations: CleanUp any failed resource": "{{ cleanup_failed_resource_pre | default('Not Executed') }}",
                                        "Test Execution: Crash ASCS resource": "{{ ascs_crash_result }}",
                                        "Test Execution: Cleanup resources": "{{ cleanup_failed_resource_test_execution }}",
                                        "Post Validations Result": "{{ hostvars[cluster_status_pre.ers_node].cluster_status_test_execution }}",
                                        }
# /*---------------------------------------------------------------------------
# |                          Post Validations                                 |
# +--------------------------------------------------------------------------*/
    - name:                             "Post Validation: {{ item.name | default('') }} - Validate Results"
      ansible.builtin.include_tasks:    "roles/misc/tasks/post-validations.yml"
      tags:                             [post-validation]

  rescue:
    - name:                             "Rescue: {{ item.name | default('') }} - Handle Failure"
      ansible.builtin.include_tasks:    "roles/misc/tasks/rescue.yml"
      tags:                             [cleanup]

- name:                                 "Pre Validation: {{ item.name | default('') }} - Test Case Skipped"
  become:                               true
  when:                                 pre_validations_status == "FAILED"
  block:
    - name:                             "Report: {{ item.name | default('') }} - Set test case message and details"
      ansible.builtin.set_fact:
        test_case_message_from_test_case: "Pre Validations for SCS cluster status checks failed. Please check the details."
        test_case_details_from_test_case: {
                                          "Pre Validations: Validate SCS cluster status": "{{ cluster_status_pre }}",
                                        }

    - name:                             "Post Validation: {{ item.name | default('') }} - Validate Results"
      ansible.builtin.include_tasks:    "roles/misc/tasks/post-validations.yml"
      tags:                             [post-validation]
