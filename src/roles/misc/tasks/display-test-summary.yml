####################################################################################
#              Display test result summary at end of playbook execution             #
####################################################################################

- name:                                 "Display test result summary"
  run_once:                             true
  delegate_to:                          localhost
  block:
    - name:                             "Generate test summary from log file"
      display_test_summary:
        test_group_invocation_id:       "{{ test_group_invocation_id }}"
        workspace_directory:            "{{ _workspace_directory }}"
      register:                         test_summary_result

    - name:                             "Show test execution summary"
      ansible.builtin.debug:
        msg:                            "{{ test_summary_result.summary.split('\n') }}"
      when:                             test_summary_result.summary | default('') | length > 0

    - name:                             "Show failed parameters detail"
      ansible.builtin.debug:
        msg:                            "{{ item.name }}: actual={{ item.value }} expected={{ item.expected_value }} ({{ item.category }})"
      loop:                             "{{ test_summary_result.failed_parameters | default([]) }}"
      loop_control:
        label:                          "{{ item.name }}"
      when:
                                        - test_summary_result.failed_parameters | default([]) | length > 0
                                        - display_failed_details | default(true) | bool
