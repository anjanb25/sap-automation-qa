# /*---------------------------------------------------------------------------
# |                          Get SAPHanaSR Provider (on SUSE only)            |
# +--------------------------------------------------------------------------*/

- name:                               "Pre Validation: {{ item.name | default('') }} - Get SAPHanaSR Provider"
  block:
  - name:                             "Pre Validation: {{ item.name | default('') }} - Query SAPHanaSR Provider"
    when:                             (ansible_os_family | upper) == "SUSE"
    become:                           true
    become_user:                      "{{ db_sid | lower }}adm"
    ansible.builtin.command:          "SAPHanaSR-manageProvider --sid {{ db_sid | upper }} --show --provider=sushanasr"
    register:                         hanasr_command_output
    changed_when:                     false
    failed_when:                      false
    args:
      chdir:                          "/usr/sbin"

  - name:                             "Pre Validation: {{ item.name | default('') }} - Detect SAPHanaController Resource Type"
    become:                           true
    ansible.builtin.shell: >-
                                      set -o pipefail &&
                                      cibadmin --query --xpath
                                      "//primitive[@type='SAPHanaController']"
                                      --node-path 2>/dev/null | head -1
    args:
      executable:                     /bin/bash
    register:                         hanacontroller_check
    changed_when:                     false
    failed_when:                      false

  - name:                             "Pre Validation: {{ item.name | default('') }} - Check SAPHanaSR Scale-Out Package"
    become:                           true
    ansible.builtin.shell: >-
                                      set -o pipefail &&
                                      rpm -q SAPHanaSR-ScaleOut 2>/dev/null ||
                                      rpm -q resource-agents-sap-hana-scaleout 2>/dev/null
    args:
      executable:                     /bin/bash
    register:                         scaleout_rpm_check
    changed_when:                     false
    failed_when:                      false

  - name:                             "Pre Validation: {{ item.name | default('') }} - Set SAPHanaSR Scale-Out Provider"
    when:
                                      - scaleout_rpm_check.rc | int == 0
    ansible.builtin.set_fact:
      saphanasr_provider:             "SAPHanaSR-ScaleOut"

  - name:                             "Pre Validation: {{ item.name | default('') }} - Set SAPHanaSR Angi Provider"
    when:                             >
                                      saphanasr_provider is not defined
                                      and (
                                        (hanasr_command_output is defined
                                        and hanasr_command_output.stdout | default('') | length > 0)
                                        or
                                        (hanacontroller_check.rc == 0
                                        and hanacontroller_check.stdout | length > 0)
                                      )
    ansible.builtin.set_fact:
      saphanasr_provider:             "SAPHanaSR-angi"

  - name:                             "Pre Validation: {{ item.name | default('') }} - Set SAPHanaSR Provider"
    when:                             saphanasr_provider is not defined
    ansible.builtin.set_fact:
      saphanasr_provider:             "SAPHanaSR"
