# /*---------------------------------------------------------------------------|
# |            Pre Validation Tasks for ASCS/ERS Tests                         |
# /*---------------------------------------------------------------------------|

- name:                             "Pre Validation: {{ item.name | default('') }} - ASCS Nodes"
  when:                             node_tier == "scs" or node_tier == "ers"
  block:
    - name:                         "Pre Validation: {{ item.name | default('') }} - Validate SCS Cluster Status"
      get_cluster_status_scs:
        sap_sid:                    "{{ sap_sid | lower }}"
      become:                       true
      register:                     cluster_status_pre
      until:                        cluster_status_pre.ascs_node | default('') != "" and
                                    cluster_status_pre.ers_node | default('') != ""
      retries:                      "{{ pre_validation_retries | default(2) }}"
      delay:                        "{{ default_delay }}"

    - name:                         "Pre Validation: {{ item.name | default('') }} - Clean Up Failed Resources"
      become:                       true
      ansible.builtin.command:      crm_resource --cleanup
      register:                     cleanup_failed_resource_pre
      timeout:                      "{{ default_timeout }}"
      retries:                      3
      until:                        cleanup_failed_resource_pre.rc == 0
      changed_when:                 cleanup_failed_resource_pre.rc == 0
      failed_when:                  cleanup_failed_resource_pre.rc != 0

    - name:                         "Pre Validation: {{ item.name | default('') }} - Set Default Pre-Validation Status"
      ansible.builtin.set_fact:
        pre_validations_status:     "FAILED"

    - name:                         "Pre Validation: {{ item.name | default('') }} - Set Pre-Validation Status"
      when:
                                    - cluster_status_pre is defined
                                    - cluster_status_pre.ascs_node != "" and
                                      cluster_status_pre.ers_node != ""
                                    - cluster_status_pre.pacemaker_status == "running"
      ansible.builtin.set_fact:
        pre_validations_status:     "PASSED"

  rescue:
    - name:                         "Pre Validation: {{ item.name | default('') }} - Set Pre-Validation Status Failed"
      ansible.builtin.set_fact:
        pre_validations_status:     "FAILED"

    - name:                         "Pre Validation: {{ item.name | default('') }} - Log Failure Details"
      ansible.builtin.debug:
        msg:                        "Pre-validation failed. The test case will be skipped."
